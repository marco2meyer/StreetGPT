# Removed obsolete version key
services:
  mongo:
    image: mongo:7
    container_name: streetgpt-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - appnet
    # Uncomment to expose MongoDB externally (not recommended for prod)
    # ports:
    #   - "27017:27017"

  app:
    build: .
    container_name: streetgpt-app
    restart: unless-stopped
    depends_on:
      - mongo
    expose:
      - "8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - APP_NAME=${APP_NAME}
      - PASSWORD=${PASSWORD}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB_NAME}?authSource=${MONGO_DB_NAME}
    volumes:
      - ./config:/app/config:ro
    networks:
      - appnet

  caddy:
    image: caddy:2.10
    container_name: streetgpt-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SITE_HOST=${SITE_HOST:-91-98-77-78.sslip.io}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet

volumes:
  mongo_data:
  caddy_data:
  caddy_config:

networks:
  appnet:
    driver: bridge
